<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Kontakt | EASY DRIVE</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-900 text-white">

<header class="navbar"></header>

<section class="container mx-auto py-20 px-4">
<h1 class="text-4xl font-bold mb-10">Kontakt</h1>

<p>Email: info@easydrive.cz</p>
<p>Telefon: +420 777 123 456</p>
<p>Otevírací doba: Po–Pá 9:00–17:00</p>

<div class="mt-10 bg-gray-800 h-64 flex items-center justify-center">
Google Maps (placeholder)
</div>

<form id="contactForm" class="mt-10 max-w-lg">
<input type="text" id="name" placeholder="Jméno" class="input">
<input type="email" id="email" placeholder="Email" class="input">
<textarea id="message" placeholder="Zpráva" class="input"></textarea>
<button class="bg-yellow-400 text-black px-6 py-3 mt-4">Odeslat</button>
</form>

<p id="formMsg" class="mt-4"></p>

</section>

<script src="js/script.js"></script>
</body>
</html>
